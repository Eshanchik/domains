{% extends "base.html" %}
{% block title %}Вход — DomainGuard{% endblock %}
{% block content %}
<div class="mx-auto max-w-sm">
  <h1 class="mb-4 text-lg font-semibold">Вход в DomainGuard</h1>
  {% if error %}
    <p class="mb-4 rounded border border-red-300 bg-red-50 px-3 py-2 text-sm text-red-700">
      {{ error }}
    </p>
  {% endif %}
  <form method="post" action="/login" class="space-y-3">
    <div>
      <label class="block text-sm text-gray-600" for="login">Логин</label>
      <input id="login" name="login" required value="{{ login_value or '' }}"
             class="mt-1 w-full rounded border px-3 py-2" />
    </div>
    <div>
      <label class="block text-sm text-gray-600" for="password">Пароль</label>
      <input id="password" name="password" type="password" required
             class="mt-1 w-full rounded border px-3 py-2" />
    </div>
    {% if need_code %}
    <div>
      <label class="block text-sm text-gray-600" for="code">Код 2FA</label>
      <input id="code" name="code" inputmode="numeric" autocomplete="one-time-code" autofocus
             class="mt-1 w-full rounded border px-3 py-2 font-mono" />
    </div>
    {% endif %}
    <button type="submit"
            class="w-full rounded bg-gray-900 px-3 py-2 text-white hover:bg-gray-700">
      Войти
    </button>
  </form>
</div>
{% endblock %}
