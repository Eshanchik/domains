{% extends "base.html" %}
{% block title %}Вход — DomainGuard{% endblock %}
{% block content %}
<div class="card card-p">
  <h1 class="mb-1 text-lg font-semibold text-slate-900 dark:text-white">Вход</h1>
  <p class="mb-4 text-sm muted">Введите свои учётные данные для доступа.</p>
  {% if error %}
    <div class="flash flash-error">{{ error }}</div>
  {% endif %}
  <form method="post" action="/login" class="space-y-4">
    <div>
      <label class="label" for="login">Логин</label>
      <input id="login" name="login" required value="{{ login_value or '' }}" class="input" autofocus />
    </div>
    <div>
      <label class="label" for="password">Пароль</label>
      <input id="password" name="password" type="password" required class="input" />
    </div>
    {% if need_code %}
    <div>
      <label class="label" for="code">Код 2FA</label>
      <input id="code" name="code" inputmode="numeric" autocomplete="one-time-code" autofocus class="input input-mono" />
    </div>
    {% endif %}
    <button type="submit" class="btn btn-primary w-full">Войти</button>
  </form>
</div>
{% endblock %}
