{% extends "base.html" %}
{% block title %}Импорт доменов — DomainGuard{% endblock %}
{% block content %}
<h1 class="mb-4 text-lg font-semibold">Импорт доменов</h1>

<form method="post" action="/import" enctype="multipart/form-data" class="max-w-2xl space-y-4">
  <input type="hidden" name="commit" value="false" />
  <div>
    <label class="block text-sm text-gray-600" for="default_project_id">Проект по умолчанию</label>
    <select id="default_project_id" name="default_project_id" class="mt-1 w-full rounded border px-3 py-2">
      <option value="">— (для CSV можно указать project_code в строках) —</option>
      {% for p in projects %}<option value="{{ p.id }}">{{ p.name }} ({{ p.code }})</option>{% endfor %}
    </select>
  </div>

  <div>
    <label class="block text-sm text-gray-600" for="content">Список доменов (по одному в строке)</label>
    <textarea id="content" name="content" rows="6" placeholder="example.com&#10;another.org"
              class="mt-1 w-full rounded border px-3 py-2 font-mono text-sm"></textarea>
    <input type="hidden" name="fmt" value="bulk" />
  </div>

  <div>
    <label class="block text-sm text-gray-600" for="csv_file">…или CSV-файл</label>
    <input id="csv_file" name="csv_file" type="file" accept=".csv,text/csv" class="mt-1 block text-sm" />
    <p class="mt-1 text-xs text-gray-500">
      Колонки: <code>fqdn</code> (обяз.), <code>project_code</code>, <code>tags</code>,
      <code>notes</code>, <code>renewal_price</code>, <code>currency</code> (опц.).
    </p>
  </div>

  <button type="submit" class="rounded bg-gray-900 px-3 py-2 text-white hover:bg-gray-700">Предпросмотр</button>
</form>
{% endblock %}
