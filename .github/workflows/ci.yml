name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: domainguard
          POSTGRES_PASSWORD: domainguard
          POSTGRES_DB: domainguard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U domainguard"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://domainguard:domainguard@localhost:5432/domainguard
      REDIS_URL: redis://localhost:6379/0
      DG_MASTER_KEY: 2f4lEgCux7eN2sivGri_2plV3lhH3soDWV4g2PwwwGk=
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Apply migrations
        run: alembic upgrade head
      - name: Run tests
        run: pytest
