# Production reverse proxy with TLS (Let's Encrypt) for domains.zimbabwe-inc.com.
# Certificates are issued/renewed by certbot into the shared `certbot-etc` volume;
# the ACME http-01 challenge is served from `certbot-www` on port 80.

upstream domainguard_api {
    server api:8000;
}

server {
    listen 80;
    server_name domains.zimbabwe-inc.com;

    # ACME challenge for issuance/renewal.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    # Everything else → HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name domains.zimbabwe-inc.com;

    ssl_certificate /etc/letsencrypt/live/domains.zimbabwe-inc.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/domains.zimbabwe-inc.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 10m;

    location = /healthz {
        proxy_pass http://domainguard_api/healthz;
        access_log off;
    }
    location / {
        proxy_pass http://domainguard_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
