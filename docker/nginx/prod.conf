# Production reverse proxy with TLS (Let's Encrypt) for domains.zimbabwe-inc.com.
# Certificates are issued/renewed by certbot into the shared `certbot-etc` volume;
# the ACME http-01 challenge is served from `certbot-www` on port 80.

# Rate-limit zones (SEC / T39): defense-in-depth against login brute-force and
# MCP token abuse. Keyed by client IP.
limit_req_zone $binary_remote_addr zone=login:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=mcp:10m rate=300r/m;

server {
    listen 80;
    server_name domains.zimbabwe-inc.com;

    # ACME challenge for issuance/renewal.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    # Everything else → HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name domains.zimbabwe-inc.com;

    ssl_certificate /etc/letsencrypt/live/domains.zimbabwe-inc.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/domains.zimbabwe-inc.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 10m;

    # Security headers (SEC / T39). `always` so they apply to error responses too.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Re-resolve the `api` service via Docker's embedded DNS so a rebuilt/restarted
    # api container (new IP) is picked up without restarting nginx.
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $backend "api:8000";
    set $mcp_backend "mcp:9000";

    location = /healthz {
        proxy_pass http://$backend/healthz;
        access_log off;
    }
    # Login: rate-limited to blunt credential brute-force (app also locks out).
    location = /login {
        limit_req zone=login burst=20 nodelay;
        proxy_pass http://$backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
    # MCP server (streamable HTTP / SSE). Token-authenticated inside the app.
    location /mcp {
        limit_req zone=mcp burst=30 nodelay;
        proxy_pass http://$mcp_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }
    location / {
        proxy_pass http://$backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
