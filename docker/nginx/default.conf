# Reverse proxy for the API. TLS termination (Let's Encrypt, SEC-3) is added in a
# later production task; on MVP nginx simply fronts the FastAPI app.
upstream domainguard_api {
    server api:8000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    location / {
        proxy_pass http://domainguard_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location = /healthz {
        proxy_pass http://domainguard_api/healthz;
        access_log off;
    }

    # MCP server (streamable HTTP). Buffering off so SSE streams flow through.
    location /mcp {
        proxy_pass http://mcp:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }
}
