# Reverse proxy for the API. TLS termination (Let's Encrypt, SEC-3) is added in a
# later production task; on MVP nginx simply fronts the FastAPI app.
upstream domainguard_api {
    server api:8000;
}

# Rate-limit zones (SEC / T39), keyed by client IP.
limit_req_zone $binary_remote_addr zone=login:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=mcp:10m rate=300r/m;

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /login {
        limit_req zone=login burst=20 nodelay;
        proxy_pass http://domainguard_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://domainguard_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location = /healthz {
        proxy_pass http://domainguard_api/healthz;
        access_log off;
    }

    # MCP OAuth endpoints (metadata, authorize, token, register, revoke) → mcp app.
    location ~ ^/(authorize|token|register|revoke|\.well-known/oauth-(authorization-server|protected-resource)) {
        proxy_pass http://mcp:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # MCP server (streamable HTTP). Buffering off so SSE streams flow through.
    location /mcp {
        limit_req zone=mcp burst=30 nodelay;
        proxy_pass http://mcp:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }
}
